# Supabase CLI config — only used for Edge Function deploys (schema is applied
# manually in the SQL editor, repo convention).
project_id = "ijfgwzacaabzeknlpaff"

# Both TechKit functions authenticate themselves (CRON_SECRET / webhook signatures),
# so Supabase JWT verification is off (TECHKIT-BRIEF §5).
[functions.techkit-poller]
verify_jwt = false

[functions.techkit-webhook]
verify_jwt = false

# marketkit-worker authenticates with CRON_SECRET (MARKETKIT-BRIEF §6).
[functions.marketkit-worker]
verify_jwt = false
